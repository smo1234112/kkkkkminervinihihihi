<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gabriel Oh 전략실</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ───── TDS 토큰 (Toss Design System) ───── */
:root{
  --blue50:#E8F3FF; --blue100:#C9E2FF; --blue400:#4593FC; --blue500:#3182F6; --blue600:#2272EB;
  --red50:#FFEEEE; --red400:#FF6B6B; --red500:#F04452;
  --grey50:#F9FAFB; --grey100:#F2F4F6; --grey200:#E5E8EB; --grey300:#D1D6DB; --grey400:#B0B8C1;
  --grey500:#8B95A1; --grey600:#6B7684; --grey700:#4E5968; --grey800:#333D4B; --grey900:#191F28;
  --greyOpacity50:rgba(2,32,71,.03); --greyOpacity100:rgba(2,32,71,.05); --greyOpacity200:rgba(2,32,71,.10);
  --bg:#FFFFFF; --greyBg:#F2F4F6;
  --r-l:20px; --r-m:16px; --r-s:12px; --r-xs:10px;
  --shadow-card:0 1px 3px rgba(2,32,71,.04), 0 4px 16px rgba(2,32,71,.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
     background:var(--greyBg);color:var(--grey900);-webkit-font-smoothing:antialiased;letter-spacing:-.2px}
.app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--greyBg);padding-bottom:96px}

/* ───── 돌룽이 탑 스트립 ───── */
.dollung{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 0 3px;font-size:11px;font-weight:700;color:var(--red400);letter-spacing:.2px}
.dollung .hb{display:inline-block;animation:beat 1.6s ease-in-out infinite;font-size:10px}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.35)}30%{transform:scale(1)}45%{transform:scale(1.2)}}

/* ───── 헤더 ───── */
.nav{position:sticky;top:0;z-index:10;background:rgba(242,244,246,.86);backdrop-filter:blur(14px);
     padding:6px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between}
.nav h1{font-size:21px;font-weight:800;letter-spacing:-.6px}
.nav .meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;padding-bottom:3px}
.nav .upd{font-size:11px;color:var(--grey500);font-weight:600}
.nav .start{font-size:10.5px;color:var(--blue600);background:var(--blue50);border-radius:7px;padding:2px 7px;font-weight:800;letter-spacing:-.2px}

/* ───── 전략 선택기 ───── */
.strat{display:flex;gap:8px;margin:8px 16px 2px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.strat::-webkit-scrollbar{display:none}
.strat button{flex:none;border:0;background:var(--bg);color:var(--grey600);font-size:14px;font-weight:800;
  border-radius:12px;padding:9px 16px;cursor:pointer;box-shadow:var(--shadow-card);transition:all .18s;letter-spacing:-.3px}
.strat button.on{background:var(--grey900);color:#fff;box-shadow:0 4px 12px rgba(2,32,71,.18)}
.sdesc{margin:8px 20px 2px;font-size:12px;color:var(--grey500);font-weight:600;line-height:1.45}
.strat button.calcbtn.on{background:var(--blue500)}

/* ───── 비중 계산기 ───── */
.calc{margin:8px 16px 0}
.clabel{font-size:13px;color:var(--grey600);font-weight:600;margin:8px 4px 12px;line-height:1.5}
.clabel b{color:var(--blue600);font-weight:800}
.cinput{display:flex;gap:8px;height:50px;margin-bottom:2px}
.ccur{display:flex;background:var(--grey100);border-radius:13px;padding:4px;gap:2px;flex:none}
.ccur button{border:0;background:transparent;width:42px;border-radius:10px;font-size:16px;font-weight:800;color:var(--grey500);cursor:pointer}
.ccur button.on{background:#fff;color:var(--grey900);box-shadow:0 1px 4px var(--greyOpacity200)}
.cinput input{flex:1;min-width:0;border:0;background:var(--bg);box-shadow:var(--shadow-card);border-radius:13px;
  padding:0 16px;font-size:19px;font-weight:800;color:var(--grey900)}
.cinput input:focus{outline:2px solid var(--blue500)}
.cfx{margin:10px 4px 2px;font-size:12.5px;color:var(--grey600);font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cfx input{width:74px;border:0;background:var(--grey100);border-radius:8px;padding:7px 10px;font-size:13px;font-weight:800;text-align:right;color:var(--grey900)}
.cgrp{margin-top:14px;border-radius:18px;padding:14px 16px 8px;box-shadow:0 1px 3px rgba(2,32,71,.04);border:1px solid transparent}
.cgrp.s-common{background:#fff;border-color:#E8EBF0;padding:10px;box-shadow:0 6px 22px rgba(2,32,71,.10)}
.cgrp.s-minervini{background:#EAF2FE;border-color:#D6E6FD}
.cgrp.s-stage{background:#E6F7F0;border-color:#CFEEE1}
.cgrp.s-umd{background:#F1EBFE;border-color:#E3D6FB}
.chead{display:flex;align-items:center;font-size:14px;font-weight:800;color:var(--grey900);margin:2px 2px 6px;padding-bottom:10px;border-bottom:1.5px solid var(--grey200)}
.chead .sname{margin-right:2px}
.chead .cmut{margin-left:auto}
.wpill{font-size:11px;font-weight:800;border-radius:8px;padding:3px 8px;margin-left:8px;letter-spacing:-.2px}
.chead-hero{margin:0 0 4px;padding:14px 16px;border-radius:14px;color:#fff;font-size:15.5px;font-weight:800;letter-spacing:-.3px;
  background:linear-gradient(135deg,#2D3D5C 0%,#161E30 100%);box-shadow:0 8px 20px rgba(22,30,48,.30)}
.chsub{display:block;font-size:11px;font-weight:600;opacity:.72;margin-top:4px;letter-spacing:0}
.schip{display:inline-block;font-size:10px;font-weight:800;border-radius:7px;padding:2px 8px;letter-spacing:-.2px}
.s-common .crow{padding:11px 8px}
.crow{display:flex;align-items:center;justify-content:space-between;padding:10px 2px;border-bottom:1px solid rgba(2,32,71,.05)}
.crow:last-child{border-bottom:0}
.cl{display:flex;flex-direction:column;min-width:0}
.cl b{font-size:15px;font-weight:800;letter-spacing:-.2px}
.cko{font-size:11px;color:var(--grey500);font-weight:600;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cr{text-align:right;flex:none;margin-left:10px}
.camt{font-size:17px;font-weight:800;color:var(--grey900);letter-spacing:-.4px}
.s-common .camt{color:var(--blue600)}
.csh{font-size:11.5px;color:var(--grey500);font-weight:600;margin-top:2px}
.cmut{color:var(--grey400);font-weight:600}
.ctot{margin:18px 4px 0;padding:15px 0;border-top:2px solid var(--grey200);font-size:16px;font-weight:800;text-align:center;letter-spacing:-.3px}
.cfoot{margin:12px 6px 0;font-size:11.5px;color:var(--grey500);font-weight:500;line-height:1.6}
.cfoot b{color:var(--grey700);font-weight:800}
.cdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle}
.ctags{display:inline-flex;flex-wrap:wrap;gap:8px;margin-top:5px;font-size:10.5px;color:var(--grey600);font-weight:700}
.ctags .cdot{width:7px;height:7px;margin-right:3px}
.snote{margin:8px 16px 2px;border-radius:14px;padding:13px 16px;font-size:14px;font-weight:800;color:#fff;letter-spacing:-.3px}
.snote.on{background:linear-gradient(135deg,#2D3D5C 0%,#161E30 100%);box-shadow:0 8px 20px rgba(22,30,48,.28)}
.snote.off{background:linear-gradient(135deg,#F0584F 0%,#C0392B 100%);box-shadow:0 8px 20px rgba(192,57,43,.28)}
.snsub{display:block;font-size:11.5px;font-weight:600;opacity:.78;margin-top:4px;letter-spacing:0}

/* ───── 요약 히어로 카드 ───── */
.hero{margin:6px 16px 4px;border-radius:var(--r-l);padding:24px 22px 20px;color:#fff;position:relative;overflow:hidden}
.hero.down{background:linear-gradient(135deg,#3182F6 0%,#2272EB 60%,#1B64DA 100%);box-shadow:0 8px 24px rgba(49,130,246,.28)}
.hero.up{background:linear-gradient(135deg,#FF6B6B 0%,#F04452 55%,#D6303E 100%);box-shadow:0 8px 24px rgba(240,68,82,.30)}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.08)}
.hero .lbl{font-size:13px;font-weight:600;opacity:.9}
.hero .big{font-size:38px;font-weight:800;letter-spacing:-1px;margin:6px 0 18px;line-height:1}
.hero .grid{display:flex;gap:0;position:relative;z-index:1}
.hero .cell{flex:1}
.hero .cell+.cell{border-left:1px solid rgba(255,255,255,.18)}
.hero .cell .v{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hero .cell .k{font-size:11px;opacity:.82;margin-top:3px;font-weight:600}
.hero .cell:not(:first-child){padding-left:14px}
.hero .cell:not(:last-child){padding-right:6px}

/* ───── 오늘 신호 배너 ───── */
.banner{margin:12px 16px;border-radius:var(--r-m);padding:15px 16px;font-size:14px;font-weight:600;line-height:1.55;
  display:flex;gap:10px;align-items:flex-start}
.banner.on{background:var(--blue50);color:var(--blue600)}
.banner.off{background:var(--bg);color:var(--grey600);font-weight:500;box-shadow:var(--shadow-card)}
.banner .ico{font-size:18px;line-height:1.3;flex:none}

/* ───── 세그먼티드 컨트롤 ───── */
.seg{margin:14px 16px 8px;display:flex;background:var(--grey200);border-radius:14px;padding:4px;gap:2px}
.seg button{flex:1;border:0;background:transparent;border-radius:11px;padding:10px 0;font-size:14px;
  font-weight:700;color:var(--grey600);cursor:pointer;transition:all .2s cubic-bezier(.2,.8,.2,1);letter-spacing:-.3px}
.seg button.on{background:#fff;color:var(--grey900);box-shadow:0 2px 6px rgba(2,32,71,.10)}
.seg button .cnt{font-size:12px;color:var(--grey400);margin-left:3px}
.seg button.on .cnt{color:var(--blue500)}

/* ───── 리스트 카드 ───── */
.list{padding:2px 16px}
.card{background:var(--bg);border-radius:var(--r-m);box-shadow:var(--shadow-card);margin-bottom:10px;overflow:hidden}
.lrow{display:flex;align-items:center;padding:15px 16px}
.avatar{width:44px;height:44px;border-radius:14px;background:var(--grey100);display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;color:var(--grey700);margin-right:13px;flex:none;letter-spacing:-.5px}
.avatar.up{background:var(--red50);color:var(--red500)}
.avatar.down{background:var(--blue50);color:var(--blue600)}
.mid{flex:1;min-width:0}
.mid .t{font-size:16px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
.mid .ko{font-size:11.5px;color:var(--grey600);font-weight:600;margin-top:3px;letter-spacing:-.2px}
.mid .s{font-size:12.5px;color:var(--grey500);margin-top:4px;font-weight:500;line-height:1.4}
.mid .s b{color:var(--red500);font-weight:700}
.mid .s .dot{color:var(--grey300);margin:0 5px}
.right{text-align:right;flex:none;margin-left:10px}
.right .p{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--grey900)}
.right .r{font-size:13px;font-weight:800;margin-top:3px}
.pos{color:var(--red500)} .neg{color:var(--blue500)} .flat{color:var(--grey500)}
.chip{font-size:10.5px;font-weight:800;border-radius:7px;padding:3px 7px;letter-spacing:-.2px}
.chip.buy{background:var(--blue500);color:#fff}
.chip.sell{background:var(--grey200);color:var(--grey700)}

/* ───── 관심권 카드 ───── */
.watch-head{padding:6px 22px 12px;font-size:13px;color:var(--grey600);font-weight:600;line-height:1.5}
.watch-head b{color:var(--grey800);font-weight:700}
.wcard{background:var(--bg);border-radius:var(--r-m);box-shadow:var(--shadow-card);margin:0 16px 10px;padding:15px 16px}
.wtop{display:flex;align-items:center;justify-content:space-between}
.wtop .tk{font-size:16px;font-weight:800;letter-spacing:-.3px}
.wko{font-size:11.5px;color:var(--grey500);font-weight:600;margin-top:3px;letter-spacing:-.2px}
.wtop .gap{font-size:12px;font-weight:800;color:var(--blue600);background:var(--blue50);border-radius:8px;padding:4px 9px}
.wtop .gap.broke{color:var(--red500);background:var(--red50)}
.wprices{display:flex;gap:18px;margin-top:11px}
.wprices .item .k{font-size:11px;color:var(--grey500);font-weight:600;margin-bottom:2px}
.wprices .item .v{font-size:15px;font-weight:800;letter-spacing:-.3px}
.wprices .item .v.tgt{color:var(--blue600)}
.wbar{height:6px;border-radius:99px;background:var(--grey100);margin-top:13px;overflow:hidden;position:relative}
.wbar .fill{position:absolute;left:0;top:0;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--blue400),var(--blue500))}
.wbar.broke .fill{background:linear-gradient(90deg,var(--red400),var(--red500))}
.wnote{font-size:11.5px;color:var(--grey500);font-weight:600;margin-top:9px}
.wnote b{color:var(--blue600);font-weight:800}

/* ───── 빈 상태 / 스켈레톤 ───── */
.empty{padding:56px 20px;text-align:center;color:var(--grey500);font-size:14px;font-weight:600;line-height:1.6}
.empty .em{font-size:30px;display:block;margin-bottom:10px}
.skel{height:74px;margin:10px 16px;border-radius:var(--r-m);
  background:linear-gradient(90deg,var(--grey100) 25%,#fff 50%,var(--grey100) 75%);background-size:200% 100%;animation:sk 1.3s infinite}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}

/* ───── 하단 CTA ───── */
.cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--greyBg) 32%)}
.cta button{width:100%;border:0;background:var(--grey900);color:#fff;font-size:15px;font-weight:800;
  border-radius:15px;padding:16px 0;cursor:pointer;transition:transform .12s,background .15s;letter-spacing:-.3px}
.cta button:active{transform:scale(.985);background:#000}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(8px);background:var(--grey800);
  color:#fff;font-size:13px;font-weight:700;border-radius:12px;padding:11px 18px;opacity:0;
  transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ───── 로그인 게이트 ───── */
#gate{position:fixed;inset:0;z-index:200;background:var(--greyBg);overflow:auto;display:flex;justify-content:center}
.gate-inner{width:100%;max-width:520px;background:var(--bg);min-height:100vh;padding:42px 26px 36px;display:flex;flex-direction:column}
.gbrand{font-size:12px;font-weight:800;color:var(--blue500);letter-spacing:1px}
.gtitle{font-size:27px;font-weight:800;letter-spacing:-.7px;margin-top:8px}
.gsub{font-size:14px;color:var(--grey500);font-weight:600;margin-top:8px;margin-bottom:22px}
.gacct{position:relative;background:linear-gradient(135deg,#2D3D5C 0%,#161E30 100%);color:#fff;border-radius:18px;padding:18px 20px;box-shadow:0 12px 26px rgba(22,30,48,.26)}
.gacct-l{font-size:12px;font-weight:700;opacity:.7}
.gacct-no{font-size:22px;font-weight:800;letter-spacing:.6px;margin-top:6px}
.gacct-b{font-size:13px;font-weight:600;opacity:.82;margin-top:5px}
.gcopy{position:absolute;right:15px;top:15px;border:0;background:rgba(255,255,255,.16);color:#fff;font-size:12px;font-weight:800;border-radius:9px;padding:7px 12px;cursor:pointer}
.gcopy:active{background:rgba(255,255,255,.28)}
.gplan{margin-top:14px;border:2px solid var(--blue500);border-radius:18px;padding:16px 18px;background:var(--blue50)}
.gplan-tag{display:inline-block;background:var(--blue500);color:#fff;font-size:11px;font-weight:800;border-radius:7px;padding:4px 10px;letter-spacing:-.2px}
.gstar{color:#FFD43B}
.gplan-row{display:flex;justify-content:space-between;align-items:baseline;margin-top:13px}
.gplan-row span{font-size:14px;font-weight:700;color:var(--grey700)}
.gplan-row b{font-size:25px;font-weight:800;color:var(--blue600);letter-spacing:-.6px}
.gplan-ret{font-size:14px;color:var(--grey700);font-weight:700;margin-top:11px}
.gplan-ret b{color:var(--red500);font-size:18px;font-weight:800;letter-spacing:-.3px}
.gplan-mut{font-size:10.5px;color:var(--grey400);font-weight:600}
.gplan-feat{font-size:12px;color:var(--grey600);font-weight:600;margin-top:9px;line-height:1.55}
#gcode{margin-top:26px;width:100%;border:0;background:var(--grey100);border-radius:15px;padding:19px 0;font-size:24px;font-weight:800;text-align:center;letter-spacing:14px;color:var(--grey900);text-indent:14px}
#gcode:focus{outline:2px solid var(--blue500);background:#fff}
.gbtn{margin-top:12px;width:100%;border:0;background:var(--blue500);color:#fff;font-size:16px;font-weight:800;border-radius:15px;padding:18px 0;cursor:pointer;transition:background .15s,transform .1s}
.gbtn:active{background:var(--blue600);transform:scale(.99)}
.gerr{margin-top:13px;text-align:center;font-size:13px;font-weight:700;color:var(--red500);min-height:18px}
.gfoot{margin-top:auto;padding-top:24px;text-align:center;font-size:11px;color:var(--grey400);font-weight:600;line-height:1.6}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
</style>
</head>
<body>
<div id="gate">
  <div class="gate-inner">
    <div class="gbrand">EXPERT 전용</div>
    <div class="gtitle">Gabriel Oh 전략실</div>
    <div class="gsub">로그인 코드를 입력하세요</div>

    <div class="gacct">
      <div class="gacct-l">입금 계좌</div>
      <div class="gacct-no">940302-00771486</div>
      <div class="gacct-b">국민은행 · 예금주 오세민</div>
      <button class="gcopy" onclick="copyAcct()">복사</button>
    </div>

    <div class="gplan">
      <div class="gplan-tag"><span class="gstar">★</span> 추천 · Expert 전용</div>
      <div class="gplan-ret">매매 관리 전략 <span class="gplan-mut">· 입금 후 운영자가 개별 매매지도</span></div>
      <div class="gplan-row"><span>월 구독료</span><b>300,000원</b></div>
      <div class="gplan-feat">3전략 · 백테스트 · 비중 계산기 · 실시간 신호 · 1:1 매매지도</div>
    </div>

    <input id="gcode" type="tel" inputmode="numeric" maxlength="4" placeholder="○ ○ ○ ○" oninput="onGcode()" onkeydown="if(event.key==='Enter')checkCode()">
    <button class="gbtn" onclick="checkCode()">입장하기</button>
    <div class="gerr" id="gerr"></div>
  </div>
</div>
<div class="app">
  <div class="dollung"><span class="hb">♥</span>돌룽이<span class="hb">♥</span></div>
  <div class="nav">
    <h1>Gabriel Oh 전략실</h1>
    <div class="meta">
      <span class="upd" id="upd"></span>
      <span class="start">매매 시작일 : 6월 11일</span>
    </div>
  </div>
  <div id="content">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<div class="cta"><button onclick="location.reload()">새로고침</button></div>
<div class="toast" id="toast"></div>

<script>
const fmt = n => n==null ? "-" : Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const sign = n => (n>0?"+":"") + Number(n).toFixed(2) + "%";
const cls  = n => n>0 ? "pos" : (n<0 ? "neg" : "flat");
let DATA=null, tab="hold", curStrat="minervini";

/* 티커 → "한글기업명 / 산업" (S&P500·나스닥100 주요 종목) */
const NAMES = {
"A":"애질런트 테크놀로지스 / 의료기기",
"AAL":"아메리칸항공 / 항공",
"AAPL":"애플 / IT기기",

function koLine(t, cl){ const n = NAMES[t]; return n ? `<div class="${cl||'ko'}">${n}</div>` : ""; }

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);}

/* 보유: 매수날짜 · 매수가 · 손절가 / 현재가 · 수익률 (시간 표기 없음) */
function rowHold(p){
  const todayBuy = p.entry_date===DATA.market_date;
  return `<div class="card"><div class="lrow">
    <div class="avatar ${p.ret_pct<0?'down':'up'}">${p.ticker.slice(0,4)}</div>
    <div class="mid">
      <div class="t">${p.ticker}${todayBuy?'<span class="chip buy">오늘 매수</span>':''}</div>
      ${koLine(p.ticker)}
      <div class="s">${p.entry_date}<span class="dot">·</span>매수 $${fmt(p.entry)}<span class="dot">·</span><b>${p.sub||''}</b></div>
    </div>
    <div class="right">
      <div class="p">$${fmt(p.last)}</div>
      <div class="r ${cls(p.ret_pct)}">${sign(p.ret_pct)}</div>
    </div>
  </div></div>`;
}

/* 편출: 사유 · 매수일→매도일 · 손익률 (종가 가격 표기 없음) */
function rowClosed(c){
  return `<div class="card"><div class="lrow">
    <div class="avatar ${c.ret_pct<0?'down':'up'}">${c.ticker.slice(0,4)}</div>
    <div class="mid">
      <div class="t">${c.ticker}<span class="chip sell">${c.reason}</span></div>
      ${koLine(c.ticker)}
      <div class="s">${c.entry_date}<span class="dot">→</span>${c.exit_date}</div>
    </div>
    <div class="right"><div class="r ${cls(c.ret_pct)}" style="font-size:17px">${sign(c.ret_pct)}</div></div>
  </div></div>`;
}

/* 관심권: 8조건 충족 + 돌파 대기. 현재가/돌파목표가/남은%/거래량 표시 */
function cardWatch(w){
  if(typeof w === "string") return `<div class="wcard"><div class="wtop"><span class="tk">${w}</span></div></div>`;
  if(w.rank!==undefined){   // UMD 모멘텀 순위 대기열
    return `<div class="wcard">
      <div class="wtop"><span class="tk">${w.ticker}</span><span class="gap">모멘텀 ${w.rank}위</span></div>
      ${koLine(w.ticker,'wko')}
      <div class="wprices">
        <div class="item"><div class="k">현재가</div><div class="v">$${fmt(w.last)}</div></div>
        <div class="item"><div class="k">12개월 모멘텀</div><div class="v tgt">${(w.mom_pct>0?'+':'')+w.mom_pct.toFixed(1)}%</div></div>
      </div>
      <div class="wnote">상위 15위 안에 들면 매수 (월말 리밸런스 기준)</div>
    </div>`;
  }
  const broke = w.gap_pct<=0;                       // 이미 돌파가 위 → 거래량 대기
  const prog = broke ? 100 : Math.max(6, Math.min(99, w.last/w.pivot*100));
  const gapTxt = broke ? "돌파 완료" : "+"+w.gap_pct.toFixed(1)+"%";
  const note = broke
    ? `<b>$${fmt(w.pivot)}</b> 돌파함 · 거래량 1.5배 충족 시 매수`
    : `<b>$${fmt(w.pivot)}</b> 위로 마감 시 매수 (50일 신고가 돌파)`;
  return `<div class="wcard">
    <div class="wtop">
      <span class="tk">${w.ticker}</span>
      <span class="gap ${broke?'broke':''}">${gapTxt}</span>
    </div>
    ${koLine(w.ticker, 'wko')}
    <div class="wprices">
      <div class="item"><div class="k">현재가</div><div class="v">$${fmt(w.last)}</div></div>
      <div class="item"><div class="k">돌파 목표가</div><div class="v tgt">$${fmt(w.pivot)}</div></div>
      ${w.vol_ratio?`<div class="item"><div class="k">거래량</div><div class="v">${w.vol_ratio.toFixed(1)}배</div></div>`:''}
    </div>
    <div class="wbar ${broke?'broke':''}"><div class="fill" style="width:${prog}%"></div></div>
    <div class="wnote">${note}</div>
  </div>`;
}

function render(){
  const root=DATA;
  if(!root || !root.strategies){ document.getElementById("content").innerHTML=`<div class="empty"><span class="em">⏳</span>데이터 업데이트 중입니다.<br>잠시 후 새로고침해 주세요.</div>`; return; }
  const order=root.order||Object.keys(root.strategies);
  const strat = `<div class="strat">${order.map(k=>`<button class="${k===curStrat?'on':''}" onclick="setStrat('${k}')">${root.strategies[k].label}</button>`).join("")}<button class="calcbtn ${curStrat==='calc'?'on':''}" onclick="setStrat('calc')">💰 계산기</button></div>`;
  if(curStrat==='calc'){ renderCalc(strat, root); return; }
  if(!root.strategies[curStrat]) curStrat=order[0];
  const S=root.strategies[curStrat], s=S.summary;
  const desc = `<div class="sdesc">${S.desc}</div>`;
  const banner = S.today_buys.length
    ? `<div class="banner on"><span class="ico">🔔</span><span>오늘 매수 신호 ${S.today_buys.length}건 — <b>${S.today_buys.join(", ")}</b><br>종가 매수 후 토스 자동주문으로 관리하세요.</span></div>`
    : `<div class="banner off"><span class="ico">☕️</span><span>오늘(${root.market_date}) 신규 매수 신호가 없습니다.</span></div>`;
  const seg = `<div class="seg">
      <button class="${tab==='hold'?'on':''}" onclick="setTab('hold')">보유<span class="cnt">${S.positions.length}</span></button>
      <button class="${tab==='closed'?'on':''}" onclick="setTab('closed')">편출<span class="cnt">${S.closed.length}</span></button>
      <button class="${tab==='watch'?'on':''}" onclick="setTab('watch')">관심권<span class="cnt">${S.watch.length}</span></button>
    </div>`;
  const whead = S.mode==="rank"
    ? `<div class="watch-head"><b>모멘텀 상위 진입 대기</b> 종목 (16위~)<br>월말 리밸런스에서 상위 15위 안에 들면 편입됩니다.</div>`
    : `<div class="watch-head"><b>조건 충족</b> · 50일 신고가 <b>돌파 대기</b> 종목<br>돌파 목표가 위로 종가 마감하면 매수 신호가 뜹니다.</div>`;
  let body="";
  if(tab==="hold")
    body = S.positions.length ? `<div class="list">${S.positions.map(rowHold).join("")}</div>`
                              : `<div class="empty"><span class="em">📭</span>보유 중인 종목이 없습니다</div>`;
  if(tab==="closed")
    body = S.closed.length ? `<div class="list">${S.closed.map(rowClosed).join("")}</div>`
                           : `<div class="empty"><span class="em">🌱</span>아직 편출된 종목이 없습니다<br><span style="font-size:12.5px;color:var(--grey400)">지금부터 새로 기록을 시작합니다</span></div>`;
  if(tab==="watch")
    body = S.watch.length ? `${whead}${S.watch.map(cardWatch).join("")}`
                          : `<div class="empty"><span class="em">🔍</span>관심권 종목이 없습니다</div>`;
  document.getElementById("content").innerHTML = `
    ${strat}${desc}${snoteHtml(S)}
    <div class="hero ${s.avg_ret>0?'up':'down'}">
      <div class="lbl">${S.label} · 보유 평균 수익률</div>
      <div class="big">${sign(s.avg_ret)}</div>
      <div class="grid">
        <div class="cell"><div class="v">${s.open_count}종목</div><div class="k">보유</div></div>
        <div class="cell"><div class="v">${s.win_rate}%</div><div class="k">편출 승률</div></div>
        <div class="cell"><div class="v">${(s.realized>0?"+":"")+s.realized}%p</div><div class="k">실현 손익</div></div>
      </div>
    </div>
    ${banner}${seg}${body}`;
  document.getElementById("upd").textContent = "업데이트 " + root.updated;
}
function setTab(t){tab=t;render();}
function setStrat(k){curStrat=k;tab='hold';render();}
function snoteHtml(S){
  if(!S || !S.note) return "";
  const t = S.note.replace(/^[^\s]+\s/, "");          // 앞 이모지 제거
  const parts = t.split(" — ");
  return `<div class="snote ${S.cash?'off':'on'}">${S.cash?'⚠️':'⭐'} <b>${parts[0]}</b>${parts[1]?`<span class="snsub">${parts[1]}</span>`:""}</div>`;
}

/* ───── 비중 계산기 (UMD 40 / 미너비니 35 / Stage 25) ───── */
const WEIGHTS = {umd:0.40, minervini:0.35, stage:0.25};
let calcAmt = 10000, calcCur = "$", calcFx = 1350;
try{ const a=localStorage.getItem("calcAmt"); if(a) calcAmt=parseFloat(a)||10000;
     const c=localStorage.getItem("calcCur"); if(c) calcCur=c;
     const f=localStorage.getItem("calcFx"); if(f) calcFx=parseFloat(f)||1350; }catch(e){}
const won = n => Math.round(Number(n)).toLocaleString("en-US");

const SCOLOR = {minervini:"#3182F6", stage:"#15B886", umd:"#7048E8"};
function buyPlan(){
  const order=DATA.order||Object.keys(DATA.strategies);
  const budgetUSD = calcCur==="$" ? calcAmt : (calcAmt/(calcFx||1));
  const sleeves={}, byTicker={};
  for(const k of order){
    const S=DATA.strategies[k]; if(!S) continue;
    const ps=S.positions||[], sleeve=budgetUSD*(WEIGHTS[k]||0);
    sleeves[k]={label:S.label, w:WEIGHTS[k]||0, sleeve, color:SCOLOR[k]||"var(--grey700)"};
    const per = ps.length ? sleeve/ps.length : 0;
    for(const p of ps){
      const o = byTicker[p.ticker] || (byTicker[p.ticker]={ticker:p.ticker, last:p.last, usd:0, keys:[]});
      o.usd += per; o.keys.push(k);
    }
  }
  const common=[], single={};
  for(const t in byTicker){ const o=byTicker[t]; o.keys.length>=2 ? common.push(o) : (single[o.keys[0]]=single[o.keys[0]]||[]).push(o); }
  common.sort((a,b)=>b.usd-a.usd);
  for(const k in single) single[k].sort((a,b)=>b.usd-a.usd);
  return {budgetUSD, sleeves, common, single, order};
}
function recalcBuy(){
  const el=document.getElementById("calcResult"); if(!el) return;
  const {budgetUSD, sleeves, common, single, order}=buyPlan();
  if(!budgetUSD || budgetUSD<=0){ el.innerHTML=`<div class="empty" style="padding:34px">금액을 입력하면 종목별 매수금액이 나와요</div>`; return; }
  const fx=calcFx||1350, krw=u=>Math.round(u*fx/1000)*1000;
  const row=(o,withTags)=>{
    const shn=o.last>0?o.usd/o.last:0, sh = shn>=1?shn.toFixed(2):shn.toFixed(3);
    const ko=(NAMES[o.ticker]||"").split(" / ")[0];
    const tags = withTags ? `<span class="ctags">${o.keys.map(k=>`<span class="schip" style="color:${sleeves[k].color};background:${sleeves[k].color}1a">${sleeves[k].label}</span>`).join("")}</span>` : "";
    return `<div class="crow"><div class="cl"><b>${o.ticker}</b>${ko?`<span class="cko">${ko}</span>`:""}${tags}</div>
      <div class="cr"><div class="camt">₩${won(krw(o.usd))}</div><div class="csh">$${won(o.usd)} · ≈${sh}주 · $${fmt(o.last)}</div></div></div>`;
  };
  let html="", total=0;
  if(common.length){
    html+=`<div class="cgrp s-common"><div class="chead-hero">⭐ 공통 보유<span class="chsub">여러 전략이 함께 담은 핵심 종목 · 합산 매수</span></div>`;
    for(const o of common){ total+=o.usd; html+=row(o,true); }
    html+=`</div>`;
  }
  for(const k of order){
    const sl=sleeves[k]; if(!sl) continue; const list=single[k]||[];
    html+=`<div class="cgrp s-${k}"><div class="chead" style="border-color:${sl.color}33"><i class="cdot" style="background:${sl.color}"></i><span class="sname" style="color:${sl.color}">${sl.label}</span><span class="wpill" style="color:${sl.color};background:${sl.color}1a">${Math.round(sl.w*100)}%</span><span class="cmut">$${won(sl.sleeve)}</span></div>`;
    if(!list.length) html+=`<div class="crow"><span class="cmut">단독 보유 없음(공통에 포함)</span></div>`;
    for(const o of list){ total+=o.usd; html+=row(o,false); }
    html+=`</div>`;
  }
  html+=`<div class="ctot">총 ₩${won(krw(total))} <span class="cmut">($${won(total)} · 환율 ${fx})</span></div>
    <div class="cfoot">· 금액(₩ 또는 $)을 토스 해외주식 "금액으로 매수"에 그대로 넣으면 돼요(소수점 매수). 정수만 사려면 주식수 내림.<br>· <b>공통 보유</b> = 여러 전략이 동시에 가진 종목(배분액 합산). 색상 = 전략 구분.<br>· 비중 UMD 40 / 미너비니 35 / Stage 25, 전략 안에서는 종목 균등.</div>`;
  el.innerHTML=html;
}
function renderCalc(strat, root){
  const curBtns=["$","₩"].map(c=>`<button class="${calcCur===c?'on':''}" onclick="setCalcCur('${c}')">${c}</button>`).join("");
  document.getElementById("content").innerHTML = `${strat}
    <div class="calc">
      <div class="clabel">💰 가진 금액을 넣으면 <b>40/35/25 비중</b>으로 종목마다 얼마씩 살지 계산해줘요</div>
      <div class="cinput">
        <div class="ccur">${curBtns}</div>
        <input id="calcAmt" type="text" inputmode="numeric" value="${calcAmt?calcAmt.toLocaleString('en-US'):''}" oninput="onCalcInput(this.value)" placeholder="투자금액">
      </div>
      <div class="cfx">환율 <input type="number" value="${calcFx}" oninput="onCalcFx(this.value)"> 원/$ <span class="cmut">· 미국주식은 달러로 매수돼요</span></div>
      <div id="calcResult"></div>
    </div>`;
  recalcBuy();
  document.getElementById("upd").textContent = "업데이트 " + root.updated;
}
function onCalcInput(v){
  calcAmt = parseFloat(String(v).replace(/[^0-9.]/g,"")) || 0;
  try{localStorage.setItem("calcAmt",calcAmt);}catch(e){}
  const inp=document.getElementById("calcAmt");
  if(inp) inp.value = calcAmt ? calcAmt.toLocaleString("en-US",{maximumFractionDigits:0}) : "";
  recalcBuy();
}
function onCalcFx(v){ calcFx=parseFloat(v)||1350; try{localStorage.setItem("calcFx",calcFx);}catch(e){} recalcBuy(); }
function setCalcCur(c){ calcCur=c; try{localStorage.setItem("calcCur",c);}catch(e){} render(); }

fetch("data.json?t=" + Date.now())
  .then(r => { if(!r.ok) throw 0; return r.json(); })
  .then(d => { DATA=d; render(); })
  .catch(() => {
    document.getElementById("content").innerHTML =
      `<div class="empty"><span class="em">⚠️</span>data.json을 불러오지 못했습니다.<br>잠시 후 새로고침해 주세요.</div>`;
  });

/* ───── 로그인 게이트 ───── */
const GATE_CODE = "1511";
function copyAcct(){ try{ navigator.clipboard.writeText("940302-00771486"); }catch(e){} toast("계좌번호가 복사됐어요"); }
function onGcode(){ document.getElementById("gerr").textContent=""; }
function checkCode(){
  const g=document.getElementById("gcode"), v=(g.value||"").trim();
  if(v===GATE_CODE){
    try{ localStorage.setItem("vauth","1"); }catch(e){}
    const gate=document.getElementById("gate");
    gate.style.opacity="0"; setTimeout(()=>gate.style.display="none",200);
  } else {
    document.getElementById("gerr").textContent="로그인 코드가 올바르지 않습니다";
    g.classList.add("shake"); g.value=""; setTimeout(()=>g.classList.remove("shake"),400);
  }
}
try{ if(localStorage.getItem("vauth")==="1"){ const el=document.getElementById("gate"); if(el) el.style.display="none"; } }catch(e){}
document.getElementById("gate").style.transition="opacity .2s";
</script>
