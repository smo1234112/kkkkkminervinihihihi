<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>미너비니 전략실</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
/* ───── TDS 토큰 (Toss Design System) ───── */
:root{
  --blue50:#E8F3FF; --blue100:#C9E2FF; --blue400:#4593FC; --blue500:#3182F6; --blue600:#2272EB;
  --red50:#FFEEEE; --red400:#FF6B6B; --red500:#F04452;
  --grey50:#F9FAFB; --grey100:#F2F4F6; --grey200:#E5E8EB; --grey300:#D1D6DB; --grey400:#B0B8C1;
  --grey500:#8B95A1; --grey600:#6B7684; --grey700:#4E5968; --grey800:#333D4B; --grey900:#191F28;
  --greyOpacity50:rgba(2,32,71,.03); --greyOpacity100:rgba(2,32,71,.05); --greyOpacity200:rgba(2,32,71,.10);
  --bg:#FFFFFF; --greyBg:#F2F4F6;
  --r-l:20px; --r-m:16px; --r-s:12px; --r-xs:10px;
  --shadow-card:0 1px 3px rgba(2,32,71,.04), 0 4px 16px rgba(2,32,71,.04);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:"Pretendard",-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
     background:var(--greyBg);color:var(--grey900);-webkit-font-smoothing:antialiased;letter-spacing:-.2px}
.app{max-width:520px;margin:0 auto;min-height:100vh;background:var(--greyBg);padding-bottom:96px}

/* ───── 돌룽이 탑 스트립 ───── */
.dollung{display:flex;align-items:center;justify-content:center;gap:5px;
  padding:7px 0 3px;font-size:11px;font-weight:700;color:var(--red400);letter-spacing:.2px}
.dollung .hb{display:inline-block;animation:beat 1.6s ease-in-out infinite;font-size:10px}
@keyframes beat{0%,100%{transform:scale(1)}15%{transform:scale(1.35)}30%{transform:scale(1)}45%{transform:scale(1.2)}}

/* ───── 헤더 ───── */
.nav{position:sticky;top:0;z-index:10;background:rgba(242,244,246,.86);backdrop-filter:blur(14px);
     padding:6px 20px 12px;display:flex;align-items:flex-end;justify-content:space-between}
.nav h1{font-size:22px;font-weight:800;letter-spacing:-.6px}
.nav .upd{font-size:11px;color:var(--grey500);font-weight:600;padding-bottom:3px}

/* ───── 요약 히어로 카드 ───── */
.hero{margin:6px 16px 4px;border-radius:var(--r-l);padding:24px 22px 20px;color:#fff;position:relative;overflow:hidden;
  background:linear-gradient(135deg,#3182F6 0%,#2272EB 60%,#1B64DA 100%);box-shadow:0 8px 24px rgba(49,130,246,.28)}
.hero::after{content:"";position:absolute;right:-40px;top:-40px;width:160px;height:160px;border-radius:50%;
  background:rgba(255,255,255,.08)}
.hero .lbl{font-size:13px;font-weight:600;opacity:.9}
.hero .big{font-size:38px;font-weight:800;letter-spacing:-1px;margin:6px 0 18px;line-height:1}
.hero .grid{display:flex;gap:0;position:relative;z-index:1}
.hero .cell{flex:1}
.hero .cell+.cell{border-left:1px solid rgba(255,255,255,.18)}
.hero .cell .v{font-size:17px;font-weight:800;letter-spacing:-.3px}
.hero .cell .k{font-size:11px;opacity:.82;margin-top:3px;font-weight:600}
.hero .cell:not(:first-child){padding-left:14px}
.hero .cell:not(:last-child){padding-right:6px}

/* ───── 오늘 신호 배너 ───── */
.banner{margin:12px 16px;border-radius:var(--r-m);padding:15px 16px;font-size:14px;font-weight:600;line-height:1.55;
  display:flex;gap:10px;align-items:flex-start}
.banner.on{background:var(--blue50);color:var(--blue600)}
.banner.off{background:var(--bg);color:var(--grey600);font-weight:500;box-shadow:var(--shadow-card)}
.banner .ico{font-size:18px;line-height:1.3;flex:none}

/* ───── 세그먼티드 컨트롤 ───── */
.seg{margin:14px 16px 8px;display:flex;background:var(--grey200);border-radius:14px;padding:4px;gap:2px}
.seg button{flex:1;border:0;background:transparent;border-radius:11px;padding:10px 0;font-size:14px;
  font-weight:700;color:var(--grey600);cursor:pointer;transition:all .2s cubic-bezier(.2,.8,.2,1);letter-spacing:-.3px}
.seg button.on{background:#fff;color:var(--grey900);box-shadow:0 2px 6px rgba(2,32,71,.10)}
.seg button .cnt{font-size:12px;color:var(--grey400);margin-left:3px}
.seg button.on .cnt{color:var(--blue500)}

/* ───── 리스트 카드 ───── */
.list{padding:2px 16px}
.card{background:var(--bg);border-radius:var(--r-m);box-shadow:var(--shadow-card);margin-bottom:10px;overflow:hidden}
.lrow{display:flex;align-items:center;padding:15px 16px}
.avatar{width:44px;height:44px;border-radius:14px;background:var(--grey100);display:flex;align-items:center;
  justify-content:center;font-size:12px;font-weight:800;color:var(--grey700);margin-right:13px;flex:none;letter-spacing:-.5px}
.avatar.up{background:var(--red50);color:var(--red500)}
.avatar.down{background:var(--blue50);color:var(--blue600)}
.mid{flex:1;min-width:0}
.mid .t{font-size:16px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:6px}
.mid .s{font-size:12.5px;color:var(--grey500);margin-top:4px;font-weight:500;line-height:1.4}
.mid .s b{color:var(--red500);font-weight:700}
.mid .s .dot{color:var(--grey300);margin:0 5px}
.right{text-align:right;flex:none;margin-left:10px}
.right .p{font-size:16px;font-weight:800;letter-spacing:-.3px;color:var(--grey900)}
.right .r{font-size:13px;font-weight:800;margin-top:3px}
.pos{color:var(--red500)} .neg{color:var(--blue500)} .flat{color:var(--grey500)}
.chip{font-size:10.5px;font-weight:800;border-radius:7px;padding:3px 7px;letter-spacing:-.2px}
.chip.buy{background:var(--blue500);color:#fff}
.chip.sell{background:var(--grey200);color:var(--grey700)}

/* ───── 관심권 카드 ───── */
.watch-head{padding:6px 22px 12px;font-size:13px;color:var(--grey600);font-weight:600;line-height:1.5}
.watch-head b{color:var(--grey800);font-weight:700}
.wcard{background:var(--bg);border-radius:var(--r-m);box-shadow:var(--shadow-card);margin:0 16px 10px;padding:15px 16px}
.wtop{display:flex;align-items:center;justify-content:space-between}
.wtop .tk{font-size:16px;font-weight:800;letter-spacing:-.3px}
.wtop .gap{font-size:12px;font-weight:800;color:var(--blue600);background:var(--blue50);border-radius:8px;padding:4px 9px}
.wtop .gap.broke{color:var(--red500);background:var(--red50)}
.wprices{display:flex;gap:18px;margin-top:11px}
.wprices .item .k{font-size:11px;color:var(--grey500);font-weight:600;margin-bottom:2px}
.wprices .item .v{font-size:15px;font-weight:800;letter-spacing:-.3px}
.wprices .item .v.tgt{color:var(--blue600)}
.wbar{height:6px;border-radius:99px;background:var(--grey100);margin-top:13px;overflow:hidden;position:relative}
.wbar .fill{position:absolute;left:0;top:0;height:100%;border-radius:99px;
  background:linear-gradient(90deg,var(--blue400),var(--blue500))}
.wbar.broke .fill{background:linear-gradient(90deg,var(--red400),var(--red500))}
.wnote{font-size:11.5px;color:var(--grey500);font-weight:600;margin-top:9px}
.wnote b{color:var(--blue600);font-weight:800}

/* ───── 빈 상태 / 스켈레톤 ───── */
.empty{padding:56px 20px;text-align:center;color:var(--grey500);font-size:14px;font-weight:600;line-height:1.6}
.empty .em{font-size:30px;display:block;margin-bottom:10px}
.skel{height:74px;margin:10px 16px;border-radius:var(--r-m);
  background:linear-gradient(90deg,var(--grey100) 25%,#fff 50%,var(--grey100) 75%);background-size:200% 100%;animation:sk 1.3s infinite}
@keyframes sk{from{background-position:200% 0}to{background-position:-200% 0}}

/* ───── 하단 CTA ───── */
.cta{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  padding:12px 16px calc(16px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--greyBg) 32%)}
.cta button{width:100%;border:0;background:var(--grey900);color:#fff;font-size:15px;font-weight:800;
  border-radius:15px;padding:16px 0;cursor:pointer;transition:transform .12s,background .15s;letter-spacing:-.3px}
.cta button:active{transform:scale(.985);background:#000}
.toast{position:fixed;left:50%;bottom:100px;transform:translateX(-50%) translateY(8px);background:var(--grey800);
  color:#fff;font-size:13px;font-weight:700;border-radius:12px;padding:11px 18px;opacity:0;
  transition:all .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="app">
  <div class="dollung"><span class="hb">♥</span>돌룽이<span class="hb">♥</span></div>
  <div class="nav">
    <h1>미너비니 전략실</h1>
    <span class="upd" id="upd"></span>
  </div>
  <div id="content">
    <div class="skel"></div><div class="skel"></div><div class="skel"></div>
  </div>
</div>

<div class="cta"><button onclick="location.reload()">새로고침</button></div>
<div class="toast" id="toast"></div>

<script>
const fmt = n => n==null ? "-" : Number(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
const sign = n => (n>0?"+":"") + Number(n).toFixed(2) + "%";
const cls  = n => n>0 ? "pos" : (n<0 ? "neg" : "flat");
let DATA=null, tab="hold";

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2000);}

/* 보유: 매수날짜 · 매수가 · 손절가 / 현재가 · 수익률 (시간 표기 없음) */
function rowHold(p){
  const todayBuy = p.entry_date===DATA.market_date;
  return `<div class="card"><div class="lrow">
    <div class="avatar ${p.ret_pct<0?'down':'up'}">${p.ticker.slice(0,4)}</div>
    <div class="mid">
      <div class="t">${p.ticker}${todayBuy?'<span class="chip buy">오늘 매수</span>':''}</div>
      <div class="s">${p.entry_date}<span class="dot">·</span>매수 $${fmt(p.entry)}<span class="dot">·</span><b>손절 $${fmt(p.stop)}</b></div>
    </div>
    <div class="right">
      <div class="p">$${fmt(p.last)}</div>
      <div class="r ${cls(p.ret_pct)}">${sign(p.ret_pct)}</div>
    </div>
  </div></div>`;
}

/* 편출: 사유 · 매수일→매도일 · 손익률 (종가 가격 표기 없음) */
function rowClosed(c){
  return `<div class="card"><div class="lrow">
    <div class="avatar ${c.ret_pct<0?'down':'up'}">${c.ticker.slice(0,4)}</div>
    <div class="mid">
      <div class="t">${c.ticker}<span class="chip sell">${c.reason}</span></div>
      <div class="s">${c.entry_date}<span class="dot">→</span>${c.exit_date}</div>
    </div>
    <div class="right"><div class="r ${cls(c.ret_pct)}" style="font-size:17px">${sign(c.ret_pct)}</div></div>
  </div></div>`;
}

/* 관심권: 8조건 충족 + 돌파 대기. 현재가/돌파목표가/남은%/거래량 표시 */
function cardWatch(w){
  if(typeof w === "string") return `<div class="wcard"><div class="wtop"><span class="tk">${w}</span></div></div>`;
  const broke = w.gap_pct<=0;                       // 이미 돌파가 위 → 거래량 대기
  const prog = broke ? 100 : Math.max(6, Math.min(99, w.last/w.pivot*100));
  const gapTxt = broke ? "돌파 완료" : "+"+w.gap_pct.toFixed(1)+"%";
  const note = broke
    ? `<b>$${fmt(w.pivot)}</b> 돌파함 · 거래량 1.5배 충족 시 매수`
    : `<b>$${fmt(w.pivot)}</b> 위로 마감 시 매수 (50일 신고가 돌파)`;
  return `<div class="wcard">
    <div class="wtop">
      <span class="tk">${w.ticker}</span>
      <span class="gap ${broke?'broke':''}">${gapTxt}</span>
    </div>
    <div class="wprices">
      <div class="item"><div class="k">현재가</div><div class="v">$${fmt(w.last)}</div></div>
      <div class="item"><div class="k">돌파 목표가</div><div class="v tgt">$${fmt(w.pivot)}</div></div>
      ${w.vol_ratio?`<div class="item"><div class="k">거래량</div><div class="v">${w.vol_ratio.toFixed(1)}배</div></div>`:''}
    </div>
    <div class="wbar ${broke?'broke':''}"><div class="fill" style="width:${prog}%"></div></div>
    <div class="wnote">${note}</div>
  </div>`;
}

function render(){
  const d=DATA, s=d.summary;
  const banner = d.today_buys.length
    ? `<div class="banner on"><span class="ico">🔔</span><span>오늘 매수 신호 ${d.today_buys.length}건 — <b>${d.today_buys.join(", ")}</b><br>종가 매수 후 토스 자동주문으로 손절가를 걸어두세요.</span></div>`
    : `<div class="banner off"><span class="ico">☕️</span><span>오늘(${d.market_date}) 신규 매수 신호가 없습니다.</span></div>`;
  const seg = `<div class="seg">
      <button class="${tab==='hold'?'on':''}" onclick="setTab('hold')">보유<span class="cnt">${d.positions.length}</span></button>
      <button class="${tab==='closed'?'on':''}" onclick="setTab('closed')">편출<span class="cnt">${d.closed.length}</span></button>
      <button class="${tab==='watch'?'on':''}" onclick="setTab('watch')">관심권<span class="cnt">${d.watch.length}</span></button>
    </div>`;
  let body="";
  if(tab==="hold")
    body = d.positions.length ? `<div class="list">${d.positions.map(rowHold).join("")}</div>`
                              : `<div class="empty"><span class="em">📭</span>보유 중인 종목이 없습니다</div>`;
  if(tab==="closed")
    body = d.closed.length ? `<div class="list">${d.closed.map(rowClosed).join("")}</div>`
                           : `<div class="empty"><span class="em">🌱</span>아직 편출된 종목이 없습니다<br><span style="font-size:12.5px;color:var(--grey400)">지금부터 새로 기록을 시작합니다</span></div>`;
  if(tab==="watch")
    body = d.watch.length
      ? `<div class="watch-head"><b>미너비니 8조건 충족</b> · 50일 신고가 <b>돌파 대기</b> 종목<br>돌파 목표가 위로 종가 마감하면 매수 신호가 뜹니다.</div>${d.watch.map(cardWatch).join("")}`
      : `<div class="empty"><span class="em">🔍</span>관심권 종목이 없습니다</div>`;
  document.getElementById("content").innerHTML = `
    <div class="hero">
      <div class="lbl">보유 종목 평균 수익률</div>
      <div class="big ${s.avg_ret>0?'':''}">${sign(s.avg_ret)}</div>
      <div class="grid">
        <div class="cell"><div class="v">${s.open_count}종목</div><div class="k">보유</div></div>
        <div class="cell"><div class="v">${s.win_rate}%</div><div class="k">편출 승률</div></div>
        <div class="cell"><div class="v">${(s.realized>0?"+":"")+s.realized}%p</div><div class="k">실현 손익</div></div>
      </div>
    </div>
    ${banner}${seg}${body}`;
  document.getElementById("upd").textContent = "업데이트 " + d.updated;
}
function setTab(t){tab=t;render();}

fetch("data.json?t=" + Date.now())
  .then(r => { if(!r.ok) throw 0; return r.json(); })
  .then(d => { DATA=d; render(); })
  .catch(() => {
    document.getElementById("content").innerHTML =
      `<div class="empty"><span class="em">⚠️</span>data.json을 불러오지 못했습니다.<br>잠시 후 새로고침해 주세요.</div>`;
  });
</script>
</body>
</html>
