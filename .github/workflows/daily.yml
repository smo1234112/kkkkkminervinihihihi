name: daily-minervini-update

on:
  schedule:
    # 매일 미국장 마감 후 자동 실행 (UTC 21:30 = 한국시간 06:30, 월~토)
    # 서머타임이면 마감 1.5시간 후, 겨울이면 30분 후
    - cron: "30 21 * * 1-5"
  workflow_dispatch:   # 수동 실행 버튼도 제공

permissions:
  contents: write

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas lxml numpy curl_cffi

      - name: Run strategy engine
        run: python generate_data.py

      - name: Commit updated data
        # PAT 시크릿이 있으면 그걸로 push(→ 사람 활동으로 인식돼 60일 자동멈춤 방지),
        # 없으면 기본 토큰으로 push. 이 커밋이 Vercel 자동 재배포를 트리거한다.
        run: |
          git config user.name "smo1234112"
          git config user.email "5semmm@naver.com"
          git remote set-url origin https://x-access-token:${{ secrets.PAT || github.token }}@github.com/${{ github.repository }}
          git add data.json state.json names.json
          if git diff --cached --quiet; then
            echo "변경 없음 (휴장일 등)"
          else
            git commit -m "auto: daily update $(date -u +%Y-%m-%d)"
            git push
          fi
